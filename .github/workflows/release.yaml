name: Release

on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  PROJECT: motdyn

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Validate release tag
        shell: bash
        run: |
          set -euo pipefail

          version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n1)"
          tag="${GITHUB_REF_NAME}"

          if [[ -z "${version}" ]]; then
            echo "Failed to read package version from Cargo.toml" >&2
            exit 1
          fi

          if [[ "${tag}" != "${version}" ]]; then
            echo "Release tag ${tag} does not match package version ${version}" >&2
            exit 1
          fi

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          components: rustfmt, clippy

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-verify-${{ runner.os }}-1.95.0

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run Clippy
        run: |
          cargo clippy --locked --all-targets --all-features -- -D warnings
          cargo clippy --locked --all-targets --no-default-features -- -D warnings

      - name: Run tests
        run: |
          cargo test --locked --all-features
          cargo test --locked --no-default-features

  build:
    needs: verify
    name: build-${{ matrix.target }}-${{ matrix.variant }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            builder: cargo
            variant: full
          - target: x86_64-unknown-linux-musl
            builder: cargo-musl
            variant: full
          - target: aarch64-unknown-linux-musl
            builder: cross
            variant: full
          - target: x86_64-unknown-linux-gnu
            builder: cargo
            variant: slim
          - target: x86_64-unknown-linux-musl
            builder: cargo-musl
            variant: slim
          - target: aarch64-unknown-linux-musl
            builder: cross
            variant: slim

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          targets: ${{ matrix.target }}

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}-1.95.0

      - name: Install musl tooling
        if: ${{ matrix.builder == 'cargo-musl' }}
        run: sudo apt-get update && sudo apt-get install --yes musl-tools

      - name: Install cross
        if: ${{ matrix.builder == 'cross' }}
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build binary
        shell: bash
        run: |
          set -euo pipefail

          feature_flags=()
          if [[ "${{ matrix.variant }}" == "slim" ]]; then
            feature_flags+=(--no-default-features)
          fi

          case "${{ matrix.builder }}" in
            cargo)
              cargo build --release --locked --target "${{ matrix.target }}" "${feature_flags[@]}"
              ;;
            cargo-musl)
              CC_x86_64_unknown_linux_musl=musl-gcc cargo build --release --locked --target "${{ matrix.target }}" "${feature_flags[@]}"
              ;;
            cross)
              cross build --release --locked --target "${{ matrix.target }}" "${feature_flags[@]}"
              ;;
            *)
              echo "Unsupported builder: ${{ matrix.builder }}" >&2
              exit 1
              ;;
          esac

      - name: Package artifact
        id: package
        shell: bash
        run: |
          set -euo pipefail

          project="${PROJECT}"
          if [[ "${{ matrix.variant }}" == "slim" ]]; then
            project="${PROJECT}-slim"
          fi
          staging="${project}-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir -p "${staging}"
          cp README.md LICENSE "${staging}/"
          cp "target/${{ matrix.target }}/release/${PROJECT}" "${staging}/"
          tar czf "${staging}.tar.gz" "${staging}"
          echo "artifact=${staging}.tar.gz" >> "${GITHUB_OUTPUT}"

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.target }}-${{ matrix.variant }}
          path: ${{ steps.package.outputs.artifact }}
          compression-level: 0
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          find dist -maxdepth 2 -type f -name '*.tar.gz' -print0 \
            | sort -z \
            | xargs -0 sha256sum > dist/SHA256SUMS.txt

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        with:
          args: --latest --tag ${{ github.ref_name }} --strip header
        env:
          OUTPUT: RELEASE_NOTES.md

      - name: Create or update GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          title="motdyn ${tag}"
          mapfile -d '' assets < <(
            find dist -maxdepth 2 -type f \( -name '*.tar.gz' -o -name 'SHA256SUMS.txt' \) -print0 | sort -z
          )

          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release upload "${tag}" "${assets[@]}" --clobber
            gh release edit "${tag}" --title "${title}" --notes-file RELEASE_NOTES.md
          else
            gh release create "${tag}" "${assets[@]}" --title "${title}" --notes-file RELEASE_NOTES.md
          fi
