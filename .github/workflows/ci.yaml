name: CI

on:
  push:
    branches: [main]
    tags:
      - "*.*.*"
    paths-ignore:
      - "CHANGELOG.md"
      - "LICENSE"
      - "README.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "CHANGELOG.md"
      - "LICENSE"
      - "README.md"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          components: rustfmt
      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-${{ runner.os }}-1.95.0
      - name: Check formatting
        run: cargo fmt --all --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          components: clippy
      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-${{ runner.os }}-1.95.0
      - name: Run Clippy
        run: |
          cargo clippy --locked --all-targets --all-features -- -D warnings
          cargo clippy --locked --all-targets --no-default-features -- -D warnings

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-${{ runner.os }}-1.95.0
      - name: Run tests
        run: |
          cargo test --locked --all-features
          cargo test --locked --no-default-features
      - name: Smoke test CLI help
        run: |
          cargo run --locked -- --help >/dev/null
          cargo run --locked -- status --help >/dev/null
          cargo run --locked --no-default-features -- --help >/dev/null
          cargo run --locked --no-default-features -- --text 'service=${SERVICE:-unknown}' >/dev/null

  docker:
    name: docker
    needs: [fmt, clippy, test]
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/docker.yaml
